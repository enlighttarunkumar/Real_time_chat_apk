<svg width="1400" height="520" viewBox="0 0 1400 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">DoubtRoom repository banner</title>
  <desc id="desc">A warm cream and green banner showing the DoubtRoom name beside a stylized live academic chat.</desc>
  <defs>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" stroke="#17312A" stroke-opacity="0.055"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#17312A" flood-opacity="0.14"/>
    </filter>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#EF703D" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#EF703D" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1400" height="520" rx="32" fill="#F4F0E7"/>
  <rect width="1400" height="520" rx="32" fill="url(#grid)"/>
  <circle cx="95" cy="455" r="220" fill="url(#glow)"/>
  <circle cx="1320" cy="20" r="180" fill="#1E765C" fill-opacity="0.07"/>

  <g transform="translate(84 84)">
    <g transform="translate(0 5)">
      <rect width="58" height="58" rx="17" fill="#1E765C"/>
      <path d="M15 22L29 15L43 22L29 29L15 22Z" fill="white"/>
      <path d="M20 26V36C25 40 33 40 38 36V26" stroke="white" stroke-width="3" stroke-linejoin="round"/>
      <path d="M43 22V34" stroke="white" stroke-width="3" stroke-linecap="round"/>
      <rect x="7" y="7" width="58" height="58" rx="17" stroke="#EF703D" stroke-opacity="0.34" stroke-width="4"/>
    </g>

    <text x="82" y="47" fill="#17312A" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="31" font-weight="800" letter-spacing="-1">DoubtRoom</text>
    <text x="0" y="151" fill="#1E765C" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="800" letter-spacing="3">LIVE ACADEMIC HELP</text>
    <text x="0" y="224" fill="#17312A" font-family="Georgia, 'Times New Roman', serif" font-size="70" letter-spacing="-4">One room.</text>
    <text x="0" y="293" fill="#17312A" font-family="Georgia, 'Times New Roman', serif" font-size="70" letter-spacing="-4">Clear answers.</text>
    <path d="M3 316C111 304 250 327 405 310" stroke="#EF703D" stroke-width="7" stroke-linecap="round"/>
    <text x="0" y="363" fill="#5F6E68" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="20">Find a professor. Discuss in real time. Resolve the doubt.</text>
  </g>

  <g transform="translate(820 56)" filter="url(#shadow)">
    <rect width="494" height="408" rx="28" fill="#FFFDF8" stroke="#17312A" stroke-opacity="0.13" stroke-width="2"/>
    <rect x="1" y="1" width="492" height="72" rx="27" fill="#17312A"/>
    <circle cx="35" cy="36" r="8" fill="#5BD59B"/>
    <text x="55" y="32" fill="white" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700">Data Structures</text>
    <text x="55" y="51" fill="#D6E2DE" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11">Trie prefix search · live now</text>
    <rect x="381" y="23" width="88" height="28" rx="14" fill="#1E765C"/>
    <text x="405" y="42" fill="white" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="700">LIVE</text>

    <g transform="translate(24 99)">
      <circle cx="22" cy="22" r="22" fill="#E5F1EB"/>
      <text x="22" y="28" text-anchor="middle" fill="#1E765C" font-family="Inter, sans-serif" font-size="14" font-weight="800">S</text>
      <rect x="58" width="300" height="72" rx="18" fill="#F1EEE6"/>
      <text x="76" y="27" fill="#17312A" font-family="Inter, sans-serif" font-size="12" font-weight="700">Student</text>
      <text x="76" y="50" fill="#5F6E68" font-family="Inter, sans-serif" font-size="13">Why is trie search faster for prefixes?</text>
    </g>

    <g transform="translate(85 193)">
      <rect width="350" height="92" rx="18" fill="#1E765C"/>
      <text x="20" y="28" fill="#DCEBE5" font-family="Inter, sans-serif" font-size="12" font-weight="700">Professor</text>
      <text x="20" y="53" fill="white" font-family="Inter, sans-serif" font-size="13">A trie follows only the characters in the prefix,</text>
      <text x="20" y="73" fill="white" font-family="Inter, sans-serif" font-size="13">then collects matches from that node.</text>
      <circle cx="372" cy="24" r="22" fill="#FCE6DD"/>
      <text x="372" y="29" text-anchor="middle" fill="#D85B2B" font-family="Inter, sans-serif" font-size="14" font-weight="800">P</text>
    </g>

    <g transform="translate(24 311)">
      <rect width="446" height="68" rx="16" fill="#FFF4EE" stroke="#EF703D" stroke-opacity="0.35"/>
      <path d="M23 24L29 18L35 24L32 27V39L29 42L26 39V27L23 24Z" fill="#EF703D"/>
      <text x="49" y="27" fill="#D85B2B" font-family="Inter, sans-serif" font-size="11" font-weight="800" letter-spacing="1">FINAL ANSWER PINNED</text>
      <text x="49" y="48" fill="#17312A" font-family="Inter, sans-serif" font-size="12">Prefix length drives lookup—not the full dataset size.</text>
    </g>
  </g>
</svg>
